dereus2014:
  type: article
  title:
    value: 'An Edge-Centric Perspective on the Human Connectome: {Link} Communities in the Brain'
    short: An Edge-Centric Perspective on the Human Connectome
  author:
  - De Reus, Marcel A.
  - Saenger, Victor M.
  - Kahn, René S.
  - Van Den Heuvel, Martijn P.
  date: 2014-10
  page-range: '20130527'
  serial-number:
    doi: 10.1098/rstb.2013.0527
    issn: 0962-8436, 1471-2970
  language: en-US
  abstract: 'Brain function depends on efficient processing and integration of information within a complex network of neural interactions, known as the connectome. An important aspect of connectome architecture is the existence of community structure, providing an anatomical basis for the occurrence of functional specialization. Typically, communities are defined as groups of densely connected network nodes, representing clusters of brain regions. Looking at the connectome from a different perspective, instead focusing on the interconnecting links or edges, we find that the white matter pathways between brain regions also exhibit community structure. Eleven link communities were identified: five spanning through the midline fissure, three through the left hemisphere and three through the right hemisphere. We show that these link communities are consistently identifiable and investigate the network characteristics of their underlying white matter pathways. Furthermore, examination of the relationship between link communities and brain regions revealed that the majority of brain regions participate in multiple link communities. In particular, the highly connected and central hub regions showed a rich level of community participation, supporting the notion that these hubs play a pivotal role as confluence zones in which neural information from different domains merges.'
  parent:
    type: periodical
    title: 'Philosophical Transactions of the Royal Society B: Biological Sciences'
    issue: 1653
    volume: 369

dhapola2022:
  type: article
  title: Scarf Enables a Highly Memory-Efficient Analysis of Large-Scale Single-Cell Genomics Data
  author:
  - Dhapola, Parashar
  - Rodhe, Johan
  - Olofzon, Rasmus
  - Bonald, Thomas
  - Erlandsson, Eva
  - Soneji, Shamit
  - Karlsson, Göran
  date: 2022-08-08
  page-range: '4616'
  serial-number:
    doi: 10.1038/s41467-022-32097-3
    issn: 2041-1723
  language: en-US
  abstract: 'Abstract As the scale of single-cell genomics experiments grows into the millions, the computational requirements to process this data are beyond the reach of many. Herein we present Scarf, a modularly designed Python package that seamlessly interoperates with other single-cell toolkits and allows for memory-efficient single-cell analysis of millions of cells on a laptop or low-cost devices like single-board computers. We demonstrate Scarf’s memory and compute-time efficiency by applying it to the largest existing single-cell RNA-Seq and ATAC-Seq datasets. Scarf wraps memory-efficient implementations of a graph-based t-stochastic neighbour embedding and hierarchical clustering algorithm. Moreover, Scarf performs accurate reference-anchored mapping of datasets while maintaining memory efficiency. By implementing a subsampling algorithm, Scarf additionally has the capacity to generate representative sampling of cells from a given dataset wherein rare cell populations and lineage differentiation trajectories are conserved. Together, Scarf provides a framework wherein any researcher can perform advanced processing, subsampling, reanalysis, and integration of atlas-scale datasets on standard laptop computers. Scarf is available on Github: https://github.com/parashardhapola/scarf .'
  parent:
    type: periodical
    title: Nature Communications
    issue: 1
    volume: 13

dibartolomeo2024EvaluatingGraph:
  type: article
  title:
    value: 'Evaluating {Graph Layout Algorithms}: {A Systematic Review} of {Methods} and {Best Practices}'
    short: Evaluating {Graph Layout Algorithms}
  author:
  - Di Bartolomeo, Sara
  - Crnovrsanin, Tarik
  - Saffo, David
  - Puerta, Eduardo
  - Wilson, Connor
  - Dunne, Cody
  date: 2024-09
  page-range: e15073
  serial-number:
    doi: 10.1111/cgf.15073
    issn: 0167-7055, 1467-8659
  language: en-US
  note: 6 citations (Semantic Scholar/DOI) [2025-02-12]
  abstract: Evaluations—encompassing computational evaluations, benchmarks and user studies—are essential tools for validating the performance and applicability of graph and network layout algorithms (also known as graph drawing). These evaluations not only offer significant insights into an algorithm’s performance and capabilities, but also assist the reader in determining if the algorithm is suitable for a specific purpose, such as handling graphs with a high volume of nodes or dense graphs. Unfortunately, there is no standard approach for evaluating layout algorithms. Prior work holds a ‘Wild West’ of diverse benchmark datasets and data characteristics, as well as varied evaluation metrics and ways to report results. It is often difficult to compare layout algorithms without first implementing them and then running your own evaluation. In this systematic review, we delve into the myriad of methodologies employed to conduct evaluations—the utilized techniques, reported outcomes and the pros and cons of choosing one approach over another. Our examination extends beyond computational evaluations, encompassing usercentric evaluations, thus presenting a comprehensive understanding of algorithm validation. This systematic review—and its accompanying website—guides readers through evaluation types, the types of results reported, and the available benchmark datasets and their data characteristics. Our objective is to provide a valuable resource for readers to understand and effectively apply various evaluation methods for graph layout algorithms. A free copy of this paper and all supplemental material is available at osf.io, and the categorized papers are accessible on our website at https:// visdunneright.github.io/ gd-comp-eval/ .
  parent:
    type: periodical
    title: Computer Graphics Forum
    issue: 6
    volume: 43

