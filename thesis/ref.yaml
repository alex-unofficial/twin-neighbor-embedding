  title: Visual Exploration of High-Dimensional Data through Subspace Analysis and Dynamic Projections
  author:
  - Liu, S.
  - Wang, B.
  - Thiagarajan, J. J.
  - Bremer, P.-T.
  - Pascucci, V.
  date: 2015-06
  page-range: 271-280
