tabula:
  type: article
  title:
    value: 'The Tabula Sapiens: A Multiple-Organ, Single-Cell Transcriptomic Atlas of Humans'
    short: The Tabula Sapiens
  author:
  - The Tabula Sapiens Consortium
  - others
  date: 2022
  page-range: eabl4896
  serial-number:
    doi: 10.1126/science.abl4896
  language: en-US
  abstract: 'Molecular characterization of cell types using single-cell transcriptome sequencing is revolutionizing cell biology and enabling new insights into the physiology of human organs. We created a human reference atlas comprising nearly 500,000 cells from 24 different tissues and organs, many from the same donor. This atlas enabled molecular characterization of more than 400 cell types, their distribution across tissues, and tissue-specific variation in gene expression. Using multiple tissues from a single donor enabled identification of the clonal distribution of T cells between tissues, identification of the tissue-specific mutation rate in B cells, and analysis of the cell cycle state and proliferative potential of shared cell types across tissues. Cell type–specific RNA splicing was discovered and analyzed across tissues within an individual. , Mapping cell types in the human body The Tabula Sapiens is a molecular reference atlas for more than 400 cell types of the human body. The Tabula Sapiens Consortium used single-cell transcriptomics to measure the messenger RNA molecules in each of nearly 500,000 cells from 24 tissues and organs (see the Perspective by Liu and Zhang). These data enable new insights into how the human genome parts list is used to create distinct cell types within the human organism. In addition to creating a detailed molecular definition of these cell types, the atlas reveals many other aspects of human biology, including how the same gene can be spliced differently in different cell types, how shared cell types in different tissues can have subtle differences in their identities, and how clones of the immune system can be shared across tissues. —LZ and DJ , Single-cell transcriptomics provides a molecularly defined phenotypic reference of human cell types that spans 24 human tissues and organs. , INTRODUCTION Although the genome is often called the blueprint of an organism, it is perhaps more accurate to describe it as a parts list composed of the various genes that may or may not be used in the different cell types of a multicellular organism. Although nearly every cell in the body has essentially the same genome, each cell type makes different use of that genome and expresses a subset of all possible genes. This has motivated efforts to characterize the molecular composition of various cell types within humans and multiple model organisms, both by transcriptional and proteomic approaches. We created a human reference atlas comprising nearly 500,000 cells from 24 different tissues and organs, many from the same donor. This atlas enabled molecular characterization of more than 400 cell types, their distribution across tissues, and tissue-specific variation in gene expression. RATIONALE One caveat to current approaches to make cell atlases is that individual organs are often collected at different locations, collected from different donors, and processed using different protocols. Controlled comparisons of cell types between different tissues and organs are especially difficult when donors differ in genetic background, age, environmental exposure, and epigenetic effects. To address this, we developed an approach to analyzing large numbers of organs from the same individual. RESULTS We collected multiple tissues from individual human donors and performed coordinated single-cell transcriptome analyses on live cells. The donors come from a range of ethnicities, are balanced by gender, have a mean age of 51 years, and have a variety of medical backgrounds. Tissue experts used a defined cell ontology terminology to annotate cell types consistently across the different tissues, leading to a total of 475 distinct cell types with reference transcriptome profiles. The full dataset can be explored online with the cellxgene tool. Data were collected for the bladder, blood, bone marrow, eye, fat, heart, kidney, large intestine, liver, lung, lymph node, mammary, muscle, pancreas, prostate, salivary gland, skin, small intestine, spleen, thymus, tongue, trachea, uterus, and vasculature. Fifty-nine separate specimens in total were collected, processed, and analyzed, and 483,152 cells passed quality control filtering. On a per-compartment basis, the dataset includes 264,824 immune cells, 104,148 epithelial cells, 31,691 endothelial cells, and 82,478 stromal cells. Working with live cells, as opposed to isolated nuclei, ensured that the dataset includes all mRNA transcripts within the cell, including transcripts that have been processed by the cell''s splicing machinery, thereby enabling insight into variation in alternative splicing. The Tabula Sapiens also provided an opportunity to densely and directly sample the human microbiome throughout the gastrointestinal tract. The intestines from two donors were sectioned into five regions: the duodenum, jejunum, ileum, and ascending and sigmoid colon. Each section was transected, and three to nine samples were collected from each location, followed by amplification and sequencing of the 16 S ribosomal RNA gene. CONCLUSION The Tabula Sapiens has revealed discoveries relating to shared behavior and subtle, organ-specific differences across cell types. We found T cell clones shared between organs and characterized organ-dependent hypermutation rates among B cells. Endothelial cells and macrophages are shared across tissues, often showing subtle but clear differences in gene expression. We found an unexpectedly large and diverse amount of cell type–specific RNA splice variant usage and discovered and validated many previously undefined splices. The intestinal microbiome was revealed to have nonuniform species distributions down to the 3-inch (7.62-cm) length scale. These are but a few examples of how the Tabula Sapiens represents a broadly useful reference to deeply understand and explore human biology at cellular resolution. Overview of Tabula Sapiens. Molecular characterization of cell types using single-cell transcriptome sequencing is revolutionizing cell biology and enabling new insights into the physiology of human organs. We created a human reference atlas comprising nearly 500,000 cells from 24 different tissues and organs, many from the same donor. This multimodal atlas enabled molecular characterization of more than 400 cell types.'
  parent:
    type: periodical
    title: Science
    issue: 6594
    volume: 376

