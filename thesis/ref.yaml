costa2018:
  type: article
  title:
    value: '{GraphDDP}: A Graph-Embedding Approach to Detect Differentiation Pathways in Single-Cell-Data Using Prior Class Knowledge'
    short: '{GraphDDP}'
  author:
  - Costa, Fabrizio
  - Grün, Dominic
  - Backofen, Rolf
  date: 2018-09-11
  page-range: '3685'
  serial-number:
    doi: 10.1038/s41467-018-05988-7
    issn: 2041-1723
  language: en-US
  note: 11 citations (Semantic Scholar/DOI) [2025-02-13]
  abstract: 'Abstract Cell types can be characterized by expression profiles derived from single-cell RNA-seq. Subpopulations are identified via clustering, yielding intuitive outcomes that can be validated by marker genes. Clustering, however, implies a discretization that cannot capture the continuous nature of differentiation processes. One could give up~the detection of subpopulations and directly estimate the differentiation process from cell profiles. A combination of both types of information, however, is preferable. Crucially, clusters can serve as anchor points of differentiation trajectories. Here we present GraphDDP, which integrates both viewpoints in an intuitive visualization. GraphDDP starts from a user-defined cluster assignment and then uses a force-based graph layout approach on two types of carefully constructed edges: one emphasizing cluster membership, the other, based on density gradients, emphasizing differentiation trajectories. We show on intestinal epithelial cells and myeloid progenitor data that GraphDDP allows the identification of differentiation pathways that cannot be easily detected by other approaches.'
  parent:
    type: periodical
    title: Nature Communications
    issue: 1
    volume: 9

